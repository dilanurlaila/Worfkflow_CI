name: MLflow CI - Retrain Model

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install MLflow & dependencies
        run: |
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLflow Project (training)
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local --experiment-name "Diabetes_Classification_CI"

      # --- Skilled: simpan artefak hasil training ke repo GitHub yang sama ---
      - name: Upload MLflow run artifacts (Skilled)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-run-artifacts
          path: MLProject/mlruns

      # --- Advance: build Docker image dari model dan push ke Docker Hub ---
      # Butuh secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
      - name: Get latest run_id
        id: get_run_id
        working-directory: MLProject
        run: |
          RUN_ID=$(python -c "
          import mlflow
          runs = mlflow.search_runs(experiment_names=['Diabetes_Classification_CI'])
          print(runs.iloc[0].run_id)
          ")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: ${{ vars.ENABLE_DOCKER_PUSH == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with mlflow build-docker
        if: ${{ vars.ENABLE_DOCKER_PUSH == 'true' }}
        working-directory: MLProject
        run: |
          mlflow models build-docker \
            --model-uri "runs:/${{ steps.get_run_id.outputs.run_id }}/model" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/diabetes-classification-ci"

      - name: Push Docker image to Docker Hub
        if: ${{ vars.ENABLE_DOCKER_PUSH == 'true' }}
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/diabetes-classification-ci"
